---

- name: line-segment
  tag: line-segment
  match: "count(*)=2"
  replace:
  - test:
      if: "$Verbosity='Verbose'"
      then:
      - T: "線段"      # phrase('the line segment from' A to B)
      - x: "*[1]"
      - T: "到"                         # phrase(the line segment from A 'to' B)
      - x: "*[2]"
      else:
      - T: "線段"               # phrase(the 'line segment' A  B)
      - x: "*[1]"
      - x: "*[2]"

- name: geometry-ray
  tag: ray
  match: "count(*)=2"
  replace:
  - test:
      if: "$Verbosity='Verbose'"
      then:
      - T: "射線"             # phrase('the ray from' A to B)
      - x: "*[1]"
      - T: "到"                       # phrase(the ray from A 'to' B)
      - x: "*[2]"
      else:
      - T: "射線"                      # phrase(the 'ray'A  B)
      - x: "*[1]"
      - x: "*[2]"

- name: geometry-vector
  tag: mover
  match:
    - "*[2][self::m:mo][.='⇀'] and"  # u21c0
    - "*[1][self::m:mrow][count(*)=3 and "
    - "     *[1][self::m:mi and translate(., 'ABCDEFGHIJKLMNOPQRSTUVWXYZ', '') = ''] and"
    - "     *[2][self::m:mo and (.='\u2062' or .='\u2063')] and"
    - "     *[3][self::m:mi and translate(., 'ABCDEFGHIJKLMNOPQRSTUVWXYZ', '') = '']"
    - "                  ]"
  replace:
  - T: "向量"
  - x: "*[1]/*[1]"
  - test:
      if: "$Verbosity='Verbose'"
      then: [T: "到"]
  - x: "*[1]/*[3]"

- name: geometry-arc
  tag: mover
  match:
    - "(*[2][self::m:mo][.='\u23dc'] or *[2][self::m:mo][.='\u2322']) and"  # u23dc #2322
    - "*[1][self::m:mrow][count(*)=3 and "
    - "     *[1][self::m:mi and translate(., 'ABCDEFGHIJKLMNOPQRSTUVWXYZ', '') = ''] and"
    - "     *[2][self::m:mo and (.='\u2062' or .='\u2063')] and"
    - "     *[3][self::m:mi and translate(., 'ABCDEFGHIJKLMNOPQRSTUVWXYZ', '') = '']"
    - "                  ]"
  replace:
  - T: "弧"
  - x: "*[1]/*[1]"
  - test:
      if: "$Verbosity='Verbose'"
      then: [T: "到"]
  - x: "*[1]/*[3]"

- name: geometry-arc
  tag: arc
  match: "count(*)=2"
  replace:
  - test:
      if: "$Verbosity='Verbose'"
      then: [T: ""]            # phrase('the' arc A B C)
  - T: "弧"                        # phrase(the 'arc' A B C)
  - x: "*[1]"
  - x: "*[2]"

- name: measure-of-angle
  tag: measure-of-angle
  match: "count(*)=3"
  replace:
  - test:
      if: "$Verbosity='Verbose'"
      then:
      - T: "角度的度量"      # phrase('the measure of the angle' ABC)
      else:
      - T: "角度的度量"      # phrase('measure of angle' ABC)
  - x: "*[1]"
  - x: "*[2]"
  - x: "*[3]"


- name: coordinate
  tag: coordinate
  match: "."
  replace:
  - test:
      if: "$Verbosity='Verbose'"
      then: [OT: ""]      # phrase('the' point at 1, 2)
  - T: "點"      # phrase(the 'point' at 1, 2)
  - test:
      if: "$Verbosity='Verbose'"
      then: [T: "在"]      # phrase('the' point at 1, 2)
  - pause: short
  - insert:
      nodes: "*"
      replace: [T: "逗號", pause: auto]      # phrase(f of x 'comma' y)
  - pause: short
  - test:
      if: "($SpeechStyle='ClearSpeak' and $Verbosity='Verbose') or not(IsNode(*[last()],'leaf'))"
      then: [T: "結束點"]      # phrase(start point, 'end point')
